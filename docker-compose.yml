# launchkit/docker-compose.yml
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: launchkit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: launchkit
      POSTGRES_PASSWORD: launchkit
      POSTGRES_DB: launchkit
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - launchkit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U launchkit -d launchkit"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  launchkit_pgdata: